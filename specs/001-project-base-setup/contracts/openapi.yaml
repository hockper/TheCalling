openapi: 3.0.3
info:
  title: The Calling API
  description: Central API contract for The Calling backend and frontend service integration.
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the status of the backend API, PostgreSQL database, and Redis cache.
      responses:
        '200':
          description: All services are healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  database:
                    type: string
                    example: connected
                  redis:
                    type: string
                    example: connected
        '503':
          description: One or more services are unhealthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: string
                    example: database connection lost

  /api/auth/login:
    post:
      summary: Authenticate user
      description: Validates user credentials and sets a secure HttpOnly JWT cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: supersecretpassword
      responses:
        '200':
          description: Successfully authenticated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid email or password.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: unauthorized

  /api/users/me:
    get:
      summary: Get current authenticated user
      description: Returns the profile details of the currently logged-in user via JWT session authentication.
      security:
        - CookieAuth: []
      responses:
        '200':
          description: Successful profile retrieval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Missing or expired authentication token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: unauthorized

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: token
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d3b07384-d113-495b-a5c2-369fca0cac8f
        email:
          type: string
          format: email
          example: user@example.com
        role:
          type: string
          example: developer
        created_at:
          type: string
          format: date-time
          example: 2026-06-06T12:00:00Z
